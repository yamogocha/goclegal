name: Cron Jobs

on:
  schedule:
    # Weekly blog (Mon 16:00 UTC)
    - cron: "0 16 * * 1"

    # Weekly ad (Mon 17:00 UTC)
    - cron: "0 17 * * 1"

    # Budget (every 4 hours)
    - cron: "0 */4 * * *"

    # Google Ads (every 2 days)
    - cron: "0 18 */2 * *"

    # Weekly Google Ads tune (Mon 15:00 UTC)
    - cron: "0 15 * * 1"

  workflow_dispatch:

jobs:
  run-crons:
    runs-on: ubuntu-latest

    steps:
      # REQUIRED: pull your repo into the runner
      - name: Checkout repo
        uses: actions/checkout@v4

      # Debug (keep this until everything is stable)
      - name: Debug paths
        run: |
          echo "PWD:"
          pwd
          echo "Root contents:"
          ls -la
          echo "Client contents:"
          ls -la client || echo "NO CLIENT DIR"
          echo "Scripts contents:"
          ls -la scripts || echo "NO SCRIPTS DIR"

      # Install deps where package.json exists
      - name: Install dependencies
        working-directory: client
        run: npm install

      # ----------------------------
      # CRON EXECUTION
      # ----------------------------

      - name: Weekly blog
        if: github.event.schedule == '0 16 * * 1'
        run: npx tsx scripts/weeklyBlog.ts

      - name: Weekly ad
        if: github.event.schedule == '0 17 * * 1'
        run: npx tsx scripts/weeklyAd.ts

      - name: Budget
        if: github.event.schedule == '0 */4 * * *'
        run: npx tsx scripts/budget.ts

      - name: Google Ads
        if: github.event.schedule == '0 18 */2 * *'
        run: npx tsx scripts/googleAds.ts

      - name: Weekly Google Ads tune
        if: github.event.schedule == '0 15 * * 1'
        run: npx tsx scripts/weeklyGoogleAdsTune.ts