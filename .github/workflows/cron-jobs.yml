name: Cron Jobs

on:
  schedule:
    - cron: "0 16 * * 1"   # Weekly blog
    - cron: "0 17 * * 1"   # Weekly ad
    - cron: "0 */4 * * *"  # Budget
    - cron: "0 18 */2 * *" # Google Ads
    - cron: "0 15 * * 1"   # Weekly Google Ads tune

  workflow_dispatch:

jobs:
  run-crons:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        working-directory: client
        run: npm install

      # ----------------------------
      # CRON TASKS
      # ----------------------------

      - name: Weekly blog
        if: github.event.schedule == '0 16 * * 1'
        run: npx tsx scripts/weeklyBlog.ts

      - name: Weekly ad
        if: github.event.schedule == '0 17 * * 1'
        run: npx tsx scripts/weeklyAd.ts

      - name: Budget
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 */4 * * *'
        run: npx tsx scripts/budget.ts

      - name: Google Ads
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 18 */2 * *'
        run: npx tsx scripts/googleAds.ts

      - name: Weekly Google Ads tune
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 15 * * 1'
        run: npx tsx scripts/weeklyGoogleAdsTune.ts